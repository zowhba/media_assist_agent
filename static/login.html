<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>로그인 - MAP</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main style="max-width:380px; margin: 80px auto;">
    <div class="card">
      <h2 style="text-align:center; font-size:18px; color:#0052cc;">🎬 MAP</h2>
      <p class="muted" style="text-align:center; margin:-6px 0 12px;">Media Automation Portal</p>
      <label>사용자명</label>
      <input type="text" id="username" autofocus autocomplete="username" />
      <label>비밀번호</label>
      <input type="password" id="password" autocomplete="current-password" />
      <div class="actions" style="margin-top:16px;">
        <button id="login" style="flex:1;">로그인</button>
      </div>
      <div id="status"></div>
      <p class="muted" style="margin-top:14px; text-align:center;">
        첫 사용 시 <span class="kbd">admin</span> / <span class="kbd">admin</span>으로 로그인 후 비밀번호 변경
      </p>
    </div>
  </main>
  <script src="/static/login.js"></script>
</body>
</html>
