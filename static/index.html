<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Jira Issue Agent</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>🪄 Jira Issue Agent</h1>
    <div id="userbar"></div>
  </header>

  <main>
    <div class="card">
      <h2>1. 대화 내용 붙여넣기</h2>
      <textarea id="text" placeholder="여기에 대화 내용을 붙여넣으세요. 이미지를 직접 붙여넣어도 됩니다 (⌘V / Ctrl+V)."></textarea>

      <label>이미지 첨부 <span class="hint">(파일 선택 또는 텍스트박스에 바로 붙여넣기)</span></label>
      <input type="file" id="files" accept="image/*" multiple />
      <div class="image-grid" id="thumbs"></div>

      <div class="actions">
        <button id="analyze">🪄 자동 JIRA 생성</button>
        <button class="secondary" id="reset" type="button">초기화</button>
      </div>
      <div id="analyzeStatus"></div>
    </div>

    <div id="results"></div>
  </main>

  <script src="/static/auth.js"></script>
  <script>loadUserBar();</script>
  <script src="/static/app.js"></script>
</body>
</html>
